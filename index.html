<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Vault AI</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f4f7fb;
        color: #17202a;
      }
      main {
        max-width: 760px;
        margin: 3rem auto;
        padding: 1.25rem;
      }
      .card {
        background: #fff;
        border: 1px solid #dde4ee;
        border-radius: 12px;
        padding: 1.25rem;
        box-shadow: 0 6px 20px rgba(23, 32, 42, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .status {
        margin-bottom: 1rem;
        color: #2d4f72;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 0.65rem 0.9rem;
        background: #0a66c2;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #0954a0;
      }
      pre {
        margin: 0;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid #d7e1ed;
        background: #0d1b2a;
        color: #d8f3ff;
        min-height: 180px;
        overflow-x: auto;
      }
      .small {
        margin-top: 0.75rem;
        color: #5c6b7b;
        font-size: 0.92rem;
      }
      code {
        background: #eef3f8;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Card Vault AI</h1>
        <p class="status">The app is live on GitHub Pages.</p>

        <div class="actions">
          <button id="loadCards">Load Cards</button>
          <button id="checkHealth">Check API Health</button>
        </div>

        <pre id="output">Click a button to call the backend API.</pre>
        <p class="small">API base URL: <code id="apiBase"></code></p>
      </section>
    </main>

    <script>
      const DEFAULT_WORKER_BASE_URL = 'https://your-worker-name.your-subdomain.workers.dev';
      const configuredUrl = window.WORKER_BASE_URL || localStorage.getItem('CARD_VAULT_WORKER_URL') || DEFAULT_WORKER_BASE_URL;
      const WORKER_BASE_URL = configuredUrl.replace(/\/$/, '');

      const outputEl = document.getElementById('output');
      const apiBaseEl = document.getElementById('apiBase');
      apiBaseEl.textContent = WORKER_BASE_URL || 'NOT CONFIGURED (set window.WORKER_BASE_URL)';

      function render(data) {
        outputEl.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      }

      function endpoint(path) {
        if (!WORKER_BASE_URL || WORKER_BASE_URL.includes('your-worker-name.your-subdomain')) {
          throw new Error('Worker URL is not configured. Replace DEFAULT_WORKER_BASE_URL in index.html.');
        }
        return `${WORKER_BASE_URL}${path}`;
      }

      async function getJson(path) {
        const response = await fetch(endpoint(path), {
          method: 'GET',
          headers: { Accept: 'application/json' },
        });

        let payload;
        try {
          payload = await response.json();
        } catch {
          throw new Error(`Request failed (${response.status}) and did not return JSON.`);
        }

        if (!response.ok || payload?.ok === false) {
          const message = payload?.error || `Request failed with status ${response.status}`;
          throw new Error(message);
        }

        return payload;
      }

      document.getElementById('loadCards').addEventListener('click', async () => {
        render('Loading cards...');
        try {
          const data = await getJson('/api/cards');
          render(data);
        } catch (error) {
          render(`Could not load cards: ${error.message}`);
        }
      });

      document.getElementById('checkHealth').addEventListener('click', async () => {
        render('Checking API health...');
        try {
          const data = await getJson('/api/health');
          render(data);
        } catch (error) {
          render(`Health check failed: ${error.message}`);
        }
      });
    </script>
  </body>
</html>
